name: Sonar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sonar:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: studypdf_test
          POSTGRES_USER: studypdf
          POSTGRES_PASSWORD: studypdf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U studypdf -d studypdf_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      STUDYPDF_TEST_DATABASE_URL: postgresql://studypdf:studypdf@localhost:5432/studypdf_test
      STUDYPDF_DATABASE_URL: postgresql://studypdf:studypdf@localhost:5432/studypdf_test
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      STUDYPDF_STORAGE_BUCKET: studypdf
      STUDYPDF_SIGNING_KEY: test-signing-key
      STUDYPDF_CRON_TOKEN: test-cron-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Check JavaScript syntax
        run: node --check static/reader.js

      - name: Run tests with coverage
        run: python -m pytest

      - name: Verify coverage report
        run: |
          test -s coverage.xml
          python - <<'PY'
          import xml.etree.ElementTree as ET

          root = ET.parse("coverage.xml").getroot()
          print("coverage line-rate:", root.attrib.get("line-rate"))
          print("coverage branch-rate:", root.attrib.get("branch-rate"))
          print("covered files:")
          for class_node in root.findall(".//class")[:20]:
              print("-", class_node.attrib.get("filename"))
          PY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.coverage.exclusions=static/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
